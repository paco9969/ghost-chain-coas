<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RETA 50MG Certificate of Analysis</title>
    <meta name="description" content="RETA 50MG Certificate of Analysis" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f3f3;
        color: #444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        background: #f3f3f3;
      }
      main {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 0;
      }
      .document {
        display: grid;
        justify-items: center;
        overflow: visible;
      }
      .document img {
        display: block;
        width: 100%;
        max-width: 980px;
        height: auto;
        background: #fff;
      }
      .actions {
        display: grid;
        margin: 0.55rem auto 0;
        max-width: 980px;
        padding-inline: 0.65rem;
      }
      a {
        color: inherit;
      }
      .button {
        display: inline-block;
        justify-self: center;
        border: 1px solid #b8b8b8;
        border-radius: 8px;
        background: transparent;
        color: #555;
        font-size: 0.85rem;
        font-weight: 700;
        padding: 0.65rem 0.9rem;
        text-align: center;
        text-decoration: none;
      }
      @media (min-width: 780px) {
        main {
          width: 100%;
          max-width: 1440px;
          padding: 0 0 2.5rem;
        }
        .document img {
          max-width: 1280px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="document" aria-label="Sanitized COA preview">
        <img src="page-1.png" alt="RETA 50MG Certificate of Analysis" />
      </section>
      <section class="actions">
        <a class="button" href="../reta-50mg-yellow-cap.pdf" download>Download PDF</a>
      </section>
    </main>
  </body>
</html>
