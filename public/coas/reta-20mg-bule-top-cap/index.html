<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RETA 20MG Verified COA</title>
    <meta name="description" content="Ghost Chain verified COA for RETA 20MG" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070d;
        color: #eef5ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top left, rgba(77, 247, 255, 0.14), transparent 28rem),
          radial-gradient(circle at top right, rgba(255, 77, 141, 0.12), transparent 26rem),
          #05070d;
      }
      main {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: clamp(0.65rem, 2vw, 1.25rem);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.35rem 0 0.8rem;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        font-weight: 950;
      }
      .mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(77, 247, 255, 0.55);
        border-radius: 11px;
        background: rgba(77, 247, 255, 0.12);
        color: #4df7ff;
      }
      .badge {
        border: 1px solid rgba(112, 255, 186, 0.45);
        border-radius: 999px;
        color: #70ffba;
        font-size: 0.72rem;
        font-weight: 900;
        padding: 0.42rem 0.62rem;
        white-space: nowrap;
      }
      .meta {
        display: grid;
        gap: 0.15rem;
        margin-bottom: 0.75rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 5vw, 2.4rem);
        line-height: 1.05;
      }
      .details {
        color: #aab7cb;
        font-size: 0.9rem;
      }
      .document {
        display: grid;
        justify-items: center;
        overflow: hidden;
        border: 1px solid rgba(120, 151, 205, 0.22);
        border-radius: 16px;
        background: rgba(5, 8, 15, 0.72);
        box-shadow: 0 18px 90px rgba(0, 0, 0, 0.44);
        padding: clamp(0.28rem, 1.4vw, 1rem);
      }
      .document img {
        display: block;
        width: 100%;
        max-width: 980px;
        height: auto;
        border-radius: 4px;
        background: #fff;
      }
      .actions {
        display: grid;
        gap: 0.75rem;
        margin: 1rem auto 0;
        max-width: 980px;
      }
      a {
        color: inherit;
      }
      .button {
        display: block;
        width: 100%;
        border-radius: 14px;
        background: linear-gradient(135deg, #4df7ff, #7a7cff 52%, #ff4d8d);
        color: #05070d;
        font-weight: 950;
        padding: 0.95rem 1rem;
        text-align: center;
        text-decoration: none;
      }
      .filename {
        color: #8f9db3;
        font-size: 0.78rem;
        overflow-wrap: anywhere;
        text-align: center;
      }
      @media (min-width: 780px) {
        main { padding-block: 1.4rem 2.5rem; }
        .document { padding: 1.15rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand"><span class="mark">GC</span><span>Ghost Chain COA</span></div>
        <div class="badge">Verified</div>
      </header>
      <section class="meta">
        <h1>RETA 20MG</h1>
        <div class="details">Freedom Diagnostics · Published 2026-07-12</div>
      </section>
      <section class="document" aria-label="Sanitized COA preview">
        <img src="page-1.png" alt="RETA 20MG Verified COA" />
      </section>
      <section class="actions">
        <a class="button" href="../reta-20mg-bule-top-cap.pdf" download>Download PDF</a>
        <div class="filename">https://ghost-chain-coas.netlify.app/coas/reta-20mg-bule-top-cap.pdf</div>
      </section>
    </main>
  </body>
</html>
